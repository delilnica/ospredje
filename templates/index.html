{% extends "base.html" %}

{% block opis %}
<p>Tukaj je, enostavna metoda za deljenje raznoraznih programskih in besedilnih izsekov, imenovanih <b>fragmenti</b>.</p>
{% endblock opis %}

{% block jedro %}
<h2>Dodaj fragment</h2>
<form method="POST" action="/add">
	<div>
		<label for="title">Naslov</label>
		<br>
		<input name="title" id="title">
	</div>

	<div>
		<label for="author">Avtor</label>
		<br>
		<input name="author" id="author" value="">
	</div>

	<div>
		<label for="text">Besedilo</label>
		<br>
		<textarea name="text" id="text"></textarea>
		<br>
		<label for="is_private">Fragment je zaseben</label>
		<input name="is_private" id="is_private" type="checkbox">
	</div>

	<div>
		<input type="submit" value="Oddaj">
	</div>
</form>
{% endblock jedro %}
